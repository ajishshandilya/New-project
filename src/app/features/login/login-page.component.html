<section class="page-shell login-shell">
  <article class="login-card">
    <div>
      <span class="eyebrow">SmartCV Access</span>
      <h1>Login</h1>
      <p>Basic login form for now. Authentication wiring can be added in the next iteration.</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <label>
        Email
        <input type="email" name="email" [(ngModel)]="email" placeholder="you@example.com" />
      </label>

      <label>
        Password
        <input type="password" name="password" [(ngModel)]="password" placeholder="••••••••" />
      </label>

      <button class="button primary" type="submit">Login</button>
    </form>

    <p class="helper-text" *ngIf="submitted">
      Login is intentionally left without backend logic in this version. Use
      <a routerLink="/upload">Get Started</a> to explore the product flow.
    </p>
  </article>
</section>
